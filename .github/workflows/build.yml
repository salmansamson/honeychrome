name: Multi-Platform Build
run-name: Build for all platforms

on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

  push:
    tags:
      - 'v*' # Only builds when you push a version tag (e.g., v1.0.1)

# Cancels internal "queued" builds if you push again before the first finishes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write    # Allows uploading files to Releases
    strategy:
      fail-fast: false
      matrix:
        include:
#          - os: ubuntu-22.04
#            artifact_name: linux-x64-stable
#          - os: ubuntu-24.04
#            artifact_name: linux-x64-latest
          - os: windows-2022
            artifact_name: win-x64
#          - os: macos-14
#            artifact_name: mac-intel
#          - os: macos-latest
#            artifact_name: mac-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pytz pandas matplotlib pyinstaller
          pip install -r requirements.txt

      # --- Platform Specific Steps ---

      - name: Build Linux (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make package

      - name: Build macOS
        if: startsWith(matrix.os, 'macos')
        run: | 
          make build
          brew install create-dmg
          chmod +x create_dmg_mac.sh
          rm -f *.dmg
          echo "--- Contents of dist/ ---"
          ls -lh dist/
          echo "--- Contents of dist/honeychrome.app/Contents/ ---"
          ls -R dist/honeychrome.app/Contents/
          ./create_dmg_mac.sh

      - name: Build Windows
        if: matrix.os == 'windows-2022'
        run: |
          python build.py
          # You can run your Inno Setup script here. 
          # GitHub Windows runners have 'ISCC' (Inno Setup Compiler) pre-installed.
          ISCC honeychrome.iss

      # Adds Windows SDK tools (like MakeAppx.exe) to the environment path
      - name: Set up Windows SDK Tools
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Prepares the frozen directory with the required AppxManifest and Assets
      - name: Prepare and Package MSIX
        if: matrix.os == 'windows-2022'
        shell: powershell
        run: |
          # 1. Copy the mandatory manifest into the PyInstaller app directory
          Copy-Item -Path .\AppxManifest.xml -Destination .\dist\honeychrome\
          
          # 2. Copy the Assets folder (app logos/icons) if it exists in your repo
          if (Test-Path .\assets) {
              Copy-Item -Path .\assets -Destination .\dist\honeychrome\ -Recurse -Force
          }
          
          cd dist
                    
          # 1. More aggressive cleanup: Remove hidden files AND files with illegal naming patterns
          # Removes files starting with '.', ending with '.', or containing invalid chars
          Get-ChildItem -Path "honeychrome" -Recurse -Force | Where-Object { 
              $_.Name -match '^\.' -or $_.Name -match '\.$' -or $_.Name -match '[<>:"|?*]' 
          } | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
          
          ls -R honeychrome
          
          # --- ADD THIS: The Debugger ---
          Write-Host "Checking for invalid characters in filenames..."
          Get-ChildItem -Path "honeychrome" -Recurse | Where-Object { 
              $_.Name -match '[\u0080-\uFFFF]' # Look for non-ASCII characters
          } | Select-Object FullName | Format-Table -AutoSize
          
          # --- ADD THIS: List all files to check for deep nesting or long paths ---
          # MakeAppx can fail if file paths exceed 260 characters
          Get-ChildItem -Path "honeychrome" -Recurse | Where-Object { $_.FullName.Length -gt 250 } | Select-Object FullName

          # 2. Use the /m flag to generate a mapping file first (helps debug exactly which file fails)
          # This separates the validation phase from the packing phase
          MakeAppx.exe pack /v /o /d "honeychrome" /p "honeychrome.msix" /m "mapping.xml"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            **/*.exe
            **/*.dmg
            **/*.tar.gz
            *.msix

      - name: Release Raw Binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            **/*.exe
            **/*.dmg
            **/*.tar.gz
            *.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
