name: Multi-Platform Build
run-name: Build for all platforms

on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

  push:
    tags:
      - 'v*' # Only builds when you push a version tag (e.g., v1.0.1)

# Cancels internal "queued" builds if you push again before the first finishes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
#          - os: ubuntu-22.04
#            artifact_name: linux-x64-stable
          - os: ubuntu-24.04
            artifact_name: linux-x64-latest
          - os: windows-2022
            artifact_name: win-x64
          - os: macos-14
            artifact_name: mac-intel
          - os: macos-latest
            artifact_name: mac-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pytz pandas matplotlib pyinstaller
          pip install -r requirements.txt

      # --- Platform Specific Steps ---

      - name: Build Linux (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make package

      - name: Build macOS
        if: startsWith(matrix.os, 'macos')
        run: | 
          make build
          brew install create-dmg
          chmod +x create_dmg_mac.sh
          rm -f *.dmg
          ./create_dmg_mac.sh

      - name: Build Windows
        if: matrix.os == 'windows-2022'
        run: |
          python build.py
          # You can run your Inno Setup script here. 
          # GitHub Windows runners have 'ISCC' (Inno Setup Compiler) pre-installed.
          ISCC honeychrome.iss

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            **/*.exe
            **/*.dmg
            **/*.tar.gz