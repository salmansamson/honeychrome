name: Multi-Platform Build
run-name: Build for all platforms

on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

  push:
    tags:
      - 'v*' # Only builds when you push a version tag (e.g., v1.0.1)

# Cancels internal "queued" builds if you push again before the first finishes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write    # Allows uploading files to Releases
    strategy:
      fail-fast: false
      matrix:
        include:
#          - os: ubuntu-22.04
#            artifact_name: linux-x64-stable
#          - os: ubuntu-24.04
#            artifact_name: linux-x64-latest
#          - os: windows-2022
#            artifact_name: win-x64
#          - os: macos-14
#            artifact_name: mac-intel
          - os: macos-latest
            artifact_name: mac-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pytz pandas matplotlib pyinstaller
          pip install -r requirements.txt

      # --- Platform Specific Steps ---

      - name: Build Linux (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make package

      - name: Build macOS
        if: startsWith(matrix.os, 'macos')
        run: | 
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain

          make build
          brew install create-dmg
          chmod +x create_dmg_mac.sh
          rm -f *.dmg
          echo "--- Contents of dist/ ---"
          ls -lh dist/
          echo "--- Contents of dist/honeychrome.app/Contents/ ---"
          ls -R dist/honeychrome.app/Contents/
          ./create_dmg_mac.sh
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Windows
        if: matrix.os == 'windows-2022'
        run: |
          python build.py
          # You can run your Inno Setup script here. 
          # GitHub Windows runners have 'ISCC' (Inno Setup Compiler) pre-installed.
          ISCC honeychrome.iss

      # Adds Windows SDK tools (like MakeAppx.exe) to the environment path
      - name: Set up Windows SDK Tools
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Prepares the frozen directory with the required AppxManifest and Assets
      - name: Prepare and Package MSIX
        if: matrix.os == 'windows-2022'
        shell: powershell
        run: |
          # 1. Ensure clean directory paths
          $distDir = "$env:GITHUB_WORKSPACE\dist\honeychrome"
          $manifest = "$env:GITHUB_WORKSPACE\AppxManifest.xml"
          $output = "$env:GITHUB_WORKSPACE\honeychrome.msix"
          
          # 2. Copy dependencies into the dist folder
          Copy-Item -Path $manifest -Destination $distDir\AppxManifest.xml
          
          if (Test-Path "$env:GITHUB_WORKSPACE\assets") {
              Copy-Item -Path "$env:GITHUB_WORKSPACE\assets" -Destination $distDir\ -Recurse -Force
          }
          
          # 3. Aggressive Sanitization (only run this ONCE on the final source)
          Get-ChildItem -Path $distDir -Recurse -Force | Where-Object { 
              $_.Name -match '^\.' -or $_.Name -match '\.$' -or $_.Name -match '[<>:"|?*]' 
          } | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
          
          # 4. PACK: Use absolute paths, remove the /m mapping file entirely
          # We use /f (force) to ensure it treats the manifest in the folder as the primary
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\makeappx.exe" pack /v /o /d "$distDir" /p "$output"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            **/*.exe
            **/*.dmg
            **/*.tar.gz
            *.msix

      - name: Release Raw Binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            **/*.exe
            **/*.dmg
            **/*.tar.gz
            *.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
